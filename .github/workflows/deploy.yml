name: Deploy Hexo to Tencent Cloud COS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate static files
        run: npx hexo generate

      - name: Configure coscmd
        run: |
          pip install coscmd
          coscmd config -a ${{ secrets.COS_SECRET_ID }} -s ${{ secrets.COS_SECRET_KEY }} -b blog-hk-1316248323 -r ap-hongkong

      - name: Deploy to COS
        run: |
          cd ./public
          echo "--- public/images/ ---"
          ls -la images/wallhaven-wqery6-*
          echo "--- md5 (local) ---"
          md5sum images/wallhaven-wqery6-light.webp images/wallhaven-wqery6-dark.webp
          echo "--- md5 (remote, before) ---"
          coscmd info /images/wallhaven-wqery6-light.webp 2>&1 | head -10
          coscmd info /images/wallhaven-wqery6-dark.webp 2>&1 | head -10
          # 注意: 不要加 -s! -s 是 sync 模式,会跳过 md5 相同的文件。
          # 我们的 home banner 图 md5 可能恰好和 COS 上一致,会被 -s 跳过。
          echo "--- main upload (rf --delete, no -s) ---"
          coscmd upload -rf --delete ./ /
          echo "--- explicit home banner upload (force, no -s) ---"
          coscmd upload -f ./images/wallhaven-wqery6-light.webp /images/wallhaven-wqery6-light.webp
          coscmd upload -f ./images/wallhaven-wqery6-dark.webp /images/wallhaven-wqery6-dark.webp
          echo "--- md5 (remote, after) ---"
          coscmd info /images/wallhaven-wqery6-light.webp 2>&1 | head -10
          coscmd info /images/wallhaven-wqery6-dark.webp 2>&1 | head -10
