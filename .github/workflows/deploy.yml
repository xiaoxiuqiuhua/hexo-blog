name: Deploy Hexo to Tencent Cloud COS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate static files
        run: npx hexo generate

      - name: Configure coscmd
        run: |
          pip install coscmd
          coscmd config -a ${{ secrets.COS_SECRET_ID }} -s ${{ secrets.COS_SECRET_KEY }} -b blog-hk-1316248323 -r ap-hongkong

      - name: Deploy to COS
        run: |
          cd ./public
          coscmd upload -rfs --delete ./ /
          # 兜底: 显式再传一次 home banner 两张图。
          # 之前发现 -r 递归上传在某些情况下会漏传特定文件(Last-Modified 不变),
          # 这里用单文件 upload 强制覆盖,确保 CDN/源站都能拿到最新版。
          coscmd upload -fs ./images/wallhaven-wqery6-light.webp /images/wallhaven-wqery6-light.webp
          coscmd upload -fs ./images/wallhaven-wqery6-dark.webp /images/wallhaven-wqery6-dark.webp
